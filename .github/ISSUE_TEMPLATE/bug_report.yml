name: "バグ報告 / Bug report"
description: "再現可能な RepoSeiri の不具合を報告します。 / Report a reproducible RepoSeiri defect."
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 日本語
        再現可能な不具合だけをここに書いてください。セキュリティ脆弱性の詳細は公開 issue に書かず、SECURITY.md の route を使ってください。

        ## English
        Use this form only for reproducible defects. Do not put security vulnerability details in a public issue; use the route in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: "概要 / Summary"
      description: "何が壊れているかを短く書いてください。 / Briefly describe what is broken."
      placeholder: "Example: seiri audit marks an existing support route as absent."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "再現手順 / Reproduction steps"
      description: "実行した command、対象 path、必要な fixture を順番に書いてください。 / List the command, target path, and needed fixture in order."
      placeholder: |
        1. cargo run --quiet -p seiri-cli -- audit --path ... --profile ... --format markdown
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "期待した結果 / Expected result"
      description: "期待した route state、report、または CLI behavior を書いてください。 / Describe the expected route state, report, or CLI behavior."
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "実際の結果 / Actual result"
      description: "実際に出た出力、error、または route state を書いてください。 / Describe the actual output, error, or route state."
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: "環境 / Environment"
      description: "OS、Rust toolchain、RepoSeiri commit など。 / OS, Rust toolchain, RepoSeiri commit, and similar context."
      placeholder: "Windows 11, rustc 1.xx, commit abc123"
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: "関連出力 / Relevant output"
      description: "必要な範囲だけを貼ってください。 / Paste only the relevant part."
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: "確認 / Checks"
      options:
        - label: "公開 issue に未修正のセキュリティ脆弱性の詳細を書いていません。 / I did not include details of an unfixed security vulnerability in this public issue."
          required: true
        - label: "同じ問題が既存 issue または最近の変更で説明されていないか確認しました。 / I checked whether an existing issue or recent change already explains this problem."
          required: false
